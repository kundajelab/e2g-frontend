# Dev / parallel-run config: HTTP only (host port 3000 -> 80).
# The OLD prod stack still holds 80/443 during the migration, so the new stack
# serves plain HTTP here. The API is reverse-proxied (see nginx.app.conf), so the
# SPA works same-origin with VITE_API_URL=/graphql — no need to forward the
# backend port separately (one `ssh -L 3000:localhost:3000` is enough).
#
# For the HTTPS cutover, swap in nginx.tls.conf via docker-compose.tls.yml.
server {
    listen 80;
    server_name _;

    include /etc/nginx/snippets/app.conf;
}
