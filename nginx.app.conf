# Shared "app server" body — included inside the :80 (dev) and :443 (prod TLS)
# server blocks so the reverse-proxy + SPA rules live in exactly one place.

root  /usr/share/nginx/html;
index index.html;

# Reverse-proxy the API to the backend container over the internal docker
# network (plain HTTP — TLS is terminated here at nginx, so the backend needs no
# certs of its own). Use docker's embedded DNS resolver with a variable upstream
# so nginx re-resolves if the backend container is recreated (e.g. on redeploy).
resolver 127.0.0.11 valid=30s;
set $backend "backend:4000";

# GraphQL — the SPA posts here (VITE_API_URL=/graphql resolves to same origin).
location = /graphql {
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# REST endpoints (health / ingestion / exports).
location /api/ {
    proxy_pass http://$backend;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# SPA: serve the static asset if it exists, otherwise hand off to the React
# router via index.html.
location / {
    try_files $uri $uri/ /index.html;
}
