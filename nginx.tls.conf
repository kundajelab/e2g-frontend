# Production TLS config — used at cutover via docker-compose.tls.yml, which
# publishes 80/443 and mounts this file (+ the certs) over the baked-in config.
# Certs come from the host dir frontend-server/ssl (gitignored): fullchain.pem +
# private.key — copy them from the old server before cutover.

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server — terminates TLS, then serves the SPA and reverse-proxies the API.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    include /etc/nginx/snippets/app.conf;
}
